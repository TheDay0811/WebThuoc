<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare - Đăng nhập</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="container header-container">
            <a href="../index.html" class="logo">
                <img src="../assets/images/logo.png" alt="Medicare Icon" class="logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="logo-fallback" style="display: none;">
                    <i class="fa-solid fa-capsules"></i>
                </div>
                <span class="logo-text">MEDICARE</span>
            </a>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Đăng nhập</h1>
                <p class="auth-subtitle">Chào mừng bạn quay trở lại với Medicare</p>
            </div>

            <!-- Social Method Selector -->
            <div class="social-buttons">
                <button type="button" class="btn-social btn-google" id="btn-google-mode">
                    <span class="social-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </span>
                    Đăng nhập bằng Google
                </button>
                <button type="button" class="btn-social btn-facebook" id="btn-facebook-mode">
                    <span class="social-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                    </span>
                    Đăng nhập bằng Facebook
                </button>
            </div>

            <div class="auth-divider">
                <span>hoặc đăng nhập bằng email</span>
            </div>

            <!-- Dynamic Form -->
            <form id="login-form">
                <!-- Provider indicator -->
                <div id="provider-indicator" style="display:none; margin-bottom:20px; padding:12px 16px; border-radius:10px; align-items:center; gap:10px; font-size:14px; font-weight:600;">
                    <span id="provider-icon"></span>
                    <span id="provider-text"></span>
                    <button type="button" id="provider-clear" style="margin-left:auto; background:none; border:none; cursor:pointer; font-size:16px; color:#9ca3af; padding:2px 6px; border-radius:4px; transition:color 0.2s;">&times;</button>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email" id="label-email">Email hoặc Số điện thoại</label>
                    <input type="text" id="email" class="form-control" placeholder="Nhập email hoặc số điện thoại..." required>
                </div>

                <div class="form-group" id="password-group">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options" id="form-options">
                    <label class="checkbox-wrap">
                        <input type="checkbox" checked> Ghi nhớ đăng nhập
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-auth" id="btn-submit">Đăng nhập</button>
            </form>

            <div class="auth-footer">
                Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="auth-toast" id="auth-toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="auth-toast-msg">Thành công!</span>
    </div>

    <footer class="footer">
        <div class="container footer-container">
            <a href="../index.html" class="logo footer-logo">
                <img src="../assets/images/logo.png" alt="Medicare Icon" class="logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="logo-fallback" style="display: none;">
                    <i class="fa-solid fa-capsules"></i>
                </div>
                <span class="logo-text">MEDICARE</span>
            </a>
            <p class="footer-text">
                Hệ thống nhà thuốc hàng đầu Việt Nam, cam kết mang lại giải pháp chăm sóc sức khỏe tốt nhất cho cộng đồng.
            </p>
        </div>
    </footer>

    <script>
    (function() {
        'use strict';

        // ===== STATE =====
        let currentProvider = 'email';

        // ===== ELEMENTS =====
        const btnGoogle = document.getElementById('btn-google-mode');
        const btnFacebook = document.getElementById('btn-facebook-mode');
        const indicator = document.getElementById('provider-indicator');
        const providerIcon = document.getElementById('provider-icon');
        const providerText = document.getElementById('provider-text');
        const providerClear = document.getElementById('provider-clear');
        const labelEmail = document.getElementById('label-email');
        const emailInput = document.getElementById('email');
        const passwordGroup = document.getElementById('password-group');
        const formOptions = document.getElementById('form-options');
        const btnSubmit = document.getElementById('btn-submit');
        const dividerEl = document.querySelector('.auth-divider span');

        // ===== HELPERS =====
        function getUsers() {
            return JSON.parse(localStorage.getItem('medicare_users') || '[]');
        }

        function setCurrentUser(user) {
            localStorage.setItem('medicare_current_user', JSON.stringify(user));
        }

        function showToast(msg, type) {
            const toast = document.getElementById('auth-toast');
            const toastMsg = document.getElementById('auth-toast-msg');
            const icon = toast.querySelector('i');
            toast.className = 'auth-toast ' + type;
            icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
            toastMsg.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        };

        // ===== SWITCH MODE =====
        function switchMode(provider) {
            currentProvider = provider;

            btnGoogle.classList.toggle('active', provider === 'google');
            btnFacebook.classList.toggle('active', provider === 'facebook');

            if (provider === 'google') {
                indicator.style.display = 'flex';
                indicator.style.background = '#e8f0fe';
                indicator.style.color = '#1a73e8';
                indicator.style.border = '1px solid #a8c7fa';
                providerIcon.innerHTML = '<i class="fa-brands fa-google" style="color:#4285F4;"></i>';
                providerText.textContent = 'Đăng nhập bằng tài khoản Google';
                labelEmail.textContent = 'Email Google';
                emailInput.placeholder = 'Nhập email Google đã đăng ký...';
                passwordGroup.style.display = 'none';
                formOptions.style.display = 'none';
                btnSubmit.innerHTML = '<i class="fa-brands fa-google"></i> Đăng nhập bằng Google';
                btnSubmit.style.background = '#4285F4';
                dividerEl.textContent = 'hoặc đăng nhập bằng email';
            } else if (provider === 'facebook') {
                indicator.style.display = 'flex';
                indicator.style.background = '#e7f0ff';
                indicator.style.color = '#1877F2';
                indicator.style.border = '1px solid #a3c9ff';
                providerIcon.innerHTML = '<i class="fa-brands fa-facebook-f" style="color:#1877F2;"></i>';
                providerText.textContent = 'Đăng nhập bằng tài khoản Facebook';
                labelEmail.textContent = 'Email Facebook';
                emailInput.placeholder = 'Nhập email Facebook đã đăng ký...';
                passwordGroup.style.display = 'none';
                formOptions.style.display = 'none';
                btnSubmit.innerHTML = '<i class="fa-brands fa-facebook-f"></i> Đăng nhập bằng Facebook';
                btnSubmit.style.background = '#1877F2';
                dividerEl.textContent = 'hoặc đăng nhập bằng email';
            } else {
                indicator.style.display = 'none';
                labelEmail.textContent = 'Email hoặc Số điện thoại';
                emailInput.placeholder = 'Nhập email hoặc số điện thoại...';
                passwordGroup.style.display = 'block';
                formOptions.style.display = 'flex';
                btnSubmit.innerHTML = 'Đăng nhập';
                btnSubmit.style.background = '#0d6efd';
                dividerEl.textContent = 'hoặc đăng nhập bằng email';
            }

            emailInput.value = '';
            emailInput.focus();
        }

        btnGoogle.addEventListener('click', () => switchMode(currentProvider === 'google' ? 'email' : 'google'));
        btnFacebook.addEventListener('click', () => switchMode(currentProvider === 'facebook' ? 'email' : 'facebook'));
        providerClear.addEventListener('click', () => switchMode('email'));

        // ===== CHECK IF JUST REGISTERED =====
        const params = new URLSearchParams(window.location.search);
        const registeredEmail = params.get('registered');
        const registeredProvider = params.get('provider');
        if (registeredEmail) {
            if (registeredProvider === 'google') {
                switchMode('google');
                emailInput.value = registeredEmail;
                showToast('✅ Đăng ký Google thành công! Nhập email để đăng nhập.', 'success');
            } else if (registeredProvider === 'facebook') {
                switchMode('facebook');
                emailInput.value = registeredEmail;
                showToast('✅ Đăng ký Facebook thành công! Nhập email để đăng nhập.', 'success');
            } else {
                emailInput.value = registeredEmail;
                showToast('✅ Đăng ký thành công! Hãy đăng nhập.', 'success');
            }
        }

        // ===== FORM SUBMIT =====
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                showToast('Vui lòng nhập email!', 'error');
                return;
            }

            const users = getUsers();

            if (currentProvider === 'email') {
                // Email login
                const password = document.getElementById('password').value;
                if (!password) {
                    showToast('Vui lòng nhập mật khẩu!', 'error');
                    return;
                }

                const user = users.find(u => u.email === email);
                if (!user) {
                    showToast('Tài khoản không tồn tại! Vui lòng đăng ký.', 'error');
                    return;
                }
                if (user.provider !== 'email') {
                    const pLabel = user.provider === 'google' ? 'Google' : 'Facebook';
                    showToast('Tài khoản này đăng ký bằng ' + pLabel + '. Hãy bấm nút ' + pLabel + ' ở trên!', 'error');
                    return;
                }
                if (user.password !== password) {
                    showToast('Mật khẩu không đúng!', 'error');
                    return;
                }

                // Success
                setCurrentUser({
                    fullname: user.fullname,
                    email: user.email,
                    provider: user.provider,
                    avatar: user.avatar,
                });

            } else {
                // Social login (google / facebook)
                const user = users.find(u => u.email === email && u.provider === currentProvider);
                if (!user) {
                    const otherUser = users.find(u => u.email === email);
                    if (otherUser) {
                        const pLabel = otherUser.provider === 'google' ? 'Google' : otherUser.provider === 'facebook' ? 'Facebook' : 'Email';
                        showToast('Email này đăng ký bằng ' + pLabel + '. Hãy dùng phương thức đó!', 'error');
                    } else {
                        showToast('Chưa có tài khoản với email này! Hãy đăng ký trước.', 'error');
                    }
                    return;
                }

                // Success
                setCurrentUser({
                    fullname: user.fullname,
                    email: user.email,
                    provider: user.provider,
                    avatar: user.avatar,
                });
            }

            const pLabel = currentProvider === 'google' ? ' Google' : currentProvider === 'facebook' ? ' Facebook' : '';
            showToast('🎉 Đăng nhập' + pLabel + ' thành công!', 'success');
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 1200);
        });

    })();
    </script>

</body>

</html>
