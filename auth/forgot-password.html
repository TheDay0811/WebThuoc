<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare - Quên mật khẩu</title>
    <link rel="stylesheet" href="../main/styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="container header-container">
            <a href="../main/index.html" class="logo">
                <img src="../assets/images/logo.png" alt="Medicare Icon" class="logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="logo-fallback" style="display: none;">
                    <i class="fa-solid fa-capsules"></i>
                </div>
                <span class="logo-text">MEDICARE</span>
            </a>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Khôi phục mật khẩu</h1>
                <p class="auth-subtitle">Nhập email của bạn để nhận hướng dẫn khôi phục mật khẩu</p>
            </div>

            <!-- Step 1: Request Reset -->
            <form id="forgot-form">
                <div class="form-group">
                    <label class="form-label" for="reset-email">Email</label>
                    <input type="email" id="reset-email" class="form-control" placeholder="Nhập email của bạn..." required>
                </div>
                <button type="submit" class="btn-auth" id="btn-submit-forgot">Gửi yêu cầu</button>
            </form>

            <!-- Step 2: Reset Password (Hidden initially) -->
            <form id="reset-password-form" style="display: none;">
                <div class="form-group">
                    <label class="form-label" for="new-password">Mật khẩu mới</label>
                    <div class="password-wrapper">
                        <input type="password" id="new-password" class="form-control" placeholder="Tạo mật khẩu (Ít nhất 6 ký tự)" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('new-password', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-new-password">Xác nhận mật khẩu mới</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirm-new-password" class="form-control" placeholder="Nhập lại mật khẩu..." required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirm-new-password', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-auth" id="btn-submit-reset">Đổi mật khẩu mới</button>
            </form>

            <div class="auth-footer">
                <a href="login.html"><i class="fa-solid fa-arrow-left"></i> Quay lại đăng nhập</a>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div class="auth-toast" id="auth-toast">
        <i class="fa-solid fa-circle-check"></i>
        <span id="auth-toast-msg">Thành công!</span>
    </div>

    <footer class="footer">
        <div class="container footer-container">
            <a href="../main/index.html" class="logo footer-logo">
                <img src="../assets/images/logo.png" alt="Medicare Icon" class="logo-img"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                <div class="logo-fallback" style="display: none;">
                    <i class="fa-solid fa-capsules"></i>
                </div>
                <span class="logo-text">MEDICARE</span>
            </a>
            <p class="footer-text">
                Hệ thống nhà thuốc hàng đầu Việt Nam, cam kết mang lại giải pháp chăm sóc sức khỏe tốt nhất cho cộng đồng.
            </p>
        </div>
    </footer>

    <script>
    (function() {
        'use strict';

        function getUsers() {
            return JSON.parse(localStorage.getItem('medicare_users') || '[]');
        }

        function saveUsers(users) {
            localStorage.setItem('medicare_users', JSON.stringify(users));
        }

        function showToast(msg, type) {
            const toast = document.getElementById('auth-toast');
            const toastMsg = document.getElementById('auth-toast-msg');
            const icon = toast.querySelector('i');
            toast.className = 'auth-toast ' + type;
            icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-xmark';
            toastMsg.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.togglePassword = function(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        };

        let targetEmail = '';

        // Handle Forgot Form
        document.getElementById('forgot-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value.trim();

            if (!email) {
                showToast('Vui lòng nhập email!', 'error');
                return;
            }

            const users = getUsers();
            const user = users.find(u => u.email === email);

            if (!user) {
                showToast('Email này chưa được đăng ký!', 'error');
                return;
            }

            if (user.provider !== 'email') {
                const providerName = user.provider === 'google' ? 'Google' : 'Facebook';
                showToast(`Tài khoản này đăng ký bằng ${providerName}. Hãy đăng nhập qua ${providerName}!`, 'error');
                return;
            }

            // Simulate sending email
            const btn = document.getElementById('btn-submit-forgot');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';
            btn.disabled = true;

            setTimeout(() => {
                showToast('Mã khôi phục đã được gửi (Giả lập). Nhập mật khẩu mới bên dưới.', 'success');
                targetEmail = email;
                
                // Switch forms
                document.getElementById('forgot-form').style.display = 'none';
                document.getElementById('reset-password-form').style.display = 'block';
                document.querySelector('.auth-subtitle').textContent = 'Vui lòng nhập mật khẩu mới cho tài khoản ' + email;
            }, 1000);
        });

        // Handle Reset Password Form
        document.getElementById('reset-password-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmNewPassword = document.getElementById('confirm-new-password').value;

            if (newPassword.length < 6) {
                showToast('Mật khẩu phải có ít nhất 6 ký tự!', 'error');
                return;
            }

            if (newPassword !== confirmNewPassword) {
                showToast('Mật khẩu xác nhận không khớp!', 'error');
                return;
            }

            // Update password
            const users = getUsers();
            const userIndex = users.findIndex(u => u.email === targetEmail);

            if (userIndex > -1) {
                users[userIndex].password = newPassword;
                saveUsers(users);
                
                showToast('🎉 Đổi mật khẩu thành công! Đang chuyển đến trang đăng nhập...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                showToast('Có lỗi xảy ra, vui lòng thử lại!', 'error');
            }
        });

    })();
    </script>

</body>

</html>
