type User @table {
  email: String!
  username: String!
  avatarUrl: String
}

type Workspace @table {
  name: String!
  description: String
}

type Project @table {
  title: String!
  dueDate: Date
  workspace: Workspace!
}

type Task @table {
  title: String!
  status: String!
  description: String
  dueDate: Date
  priority: Int
  project: Project!
  creator: User!
  assignee: User
}

type Comment @table {
  content: String!
  createdAt: Timestamp
  task: Task!
  author: User!
}